    }

    #cesiumContainer {
      height: 100%;
      width: 100%;
    }

    /* Top controls */
    #ui {

      flex-wrap: wrap;
    }

      font-weight: 700;
      flex-shrink: 0;
    }

    }

      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    button.active {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.35);
    }

    /* Right panel */
    #panel {
      position: absolute;
      right: 12px;
      top: 72px;
      width: min(420px, calc(100vw - 24px));
      max-height: calc(100vh - 84px);
      overflow: auto;
      padding: 12px;
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.78);
      color: #fff;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      z-index: 10;
      display: none;
    }

    #panelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #panelTitle {
      font-size: 16px;
      font-weight: 900;
      margin: 0;
    }

    #closeBtn {
      padding: 6px 10px;
    }

    #meta {
      margin: 8px 0 10px;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.85);
    }

    #badgeRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 10px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.10);
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10, 12, 16, 0.58);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      z-index: 10;
      max-width: 560px;
      line-height: 1.35;
      backdrop-filter: blur(8px);
    }

    #toast {
      position: absolute;
      left: 12px;
      top: 72px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10, 12, 16, 0.75);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      z-index: 11;
      max-width: 520px;
      line-height: 1.35;
      backdrop-filter: blur(8px);
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
  </style>
</head>

    // ---------- Cesium setup ----------
    // Disable Cesium Ion to prevent 401 token errors
    Cesium.Ion.defaultAccessToken = "";

      timeline: false,
      sceneModePicker: false,
      baseLayerPicker: false,
      homeButton: true,
      geocoder: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
      shouldAnimate: false,
      terrainProvider: new Cesium.EllipsoidTerrainProvider()
    });

    // ---------- Basemap: Terrain / shaded relief ----------
    // Use an XYZ tile template (more reliable than provider wrappers in some CDN setups).
    // If this tile source fails (network / rate limits), we fallback to OpenStreetMap.
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => { t.style.display = "none"; }, 6000);
    }

    function setShadedReliefBasemap() {
      viewer.imageryLayers.removeAll();

      // Esri World Shaded Relief (map-like terrain backdrop; minimal modern cues)
      const relief = viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}",
          credit: "Basemap: Esri World Shaded Relief"
        })
      );

      // Slight tuning (keeps it readable without looking modern)
      relief.brightness = 1.05;
      relief.contrast = 1.10;
      relief.saturation = 0.95;
      relief.gamma = 0.95;

      // If tiles fail to load, fallback to OSM
      const fallback = (e) => {
        // Avoid repeated fallbacks
        if (setShadedReliefBasemap._fellBack) return;
        setShadedReliefBasemap._fellBack = true;

        console.warn("Basemap tiles failed, falling back to OpenStreetMap:", e);
        showToast("Shaded relief tiles failed to load — falling back to OpenStreetMap.");

        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
          url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
          credit: "© OpenStreetMap contributors"
        }));
      };

      // Hook Cesium's global render error event to catch tile load issues
      viewer.scene.renderError.addEventListener(fallback);
    }

    setShadedReliefBasemap();

    // Full daylight — no day/night split
    viewer.scene.globe.enableLighting = false;
    viewer.scene.skyAtmosphere.show = true;

    viewer.homeButton.viewModel.command.beforeExecute.addEventListener(e => {

      viewer.camera.flyTo({ destination: HOME_DESTINATION });

    const panelTitle = document.getElementById("panelTitle");
    const meta = document.getElementById("meta");
    const player = document.getElementById("player");
    const sources = document.getElementById("sources");
    const badgeRow = document.getElementById("badgeRow");
    const closeBtn = document.getElementById("closeBtn");

    let selectedEra = "ALL";
    let selectedYear = parseInt(yearSlider.value, 10);

    function formatYear(y) {
      if (y < 0) return `${Math.abs(y)} BCE`;
      return `${y} CE`;
    }

    function updateYearLabel() {
      yearText.textContent = formatYear(selectedYear);
    }
    updateYearLabel();

    // ---------- Pins ----------
    const pinBuilder = new Cesium.PinBuilder();

    function pinForEra(era) {
      const color =
        era === "ANCIENT" ? Cesium.Color.GOLD :
          era === "CLASSICAL" ? Cesium.Color.CORNFLOWERBLUE :
            era === "MEDIEVAL" ? Cesium.Color.MEDIUMSEAGREEN :
              era === "EARLYMODERN" ? Cesium.Color.CORAL :
                era === "MODERN" ? Cesium.Color.MEDIUMPURPLE :
                  Cesium.Color.SILVER;
      return pinBuilder.fromColor(color, 48).toDataURL();
    }

    function sceneVisibleForFilters(scene) {
      if (selectedEra === "ALL") return true;
      if (selectedEra === "TIME") return scene.start <= selectedYear && scene.end >= selectedYear;
      return scene.era === selectedEra;
    }

    // ---------- Timeline ----------
    yearSlider.addEventListener("input", () => {
      selectedYear = parseInt(yearSlider.value, 10);
      updateYearLabel();
      // Switch to time-based filtering mode
      selectedEra = "TIME";
      eraButtons.forEach(b => b.classList.remove("active"));
      yearSlider.disabled = false;
      yearSlider.style.opacity = "1";
      yearSlider.style.cursor = "pointer";
      document.getElementById("yearLabel").style.opacity = "1";
      rebuildEntities();
    });

    function rebuildEntities() {
      viewer.entities.removeAll();

      const visible = scenes.filter(sceneVisibleForFilters);

      for (const s of visible) {
        viewer.entities.add({
          id: s.id,
          name: s.title,
          position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat),
          billboard: {
            image: pinForEra(s.era),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scale: 1.0
          },
          label: {
            text: s.title,
            show: false,
            font: "13px system-ui",
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            verticalOrigin: Cesium.VerticalOrigin.TOP,
            pixelOffset: new Cesium.Cartesian2(0, 10),
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
          },
          properties: {
            scene: s
          }
        });
      }

      if (!visible.length) closePanel();
    }

    rebuildEntities();

    // Hover label
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction((movement) => {
      const picked = viewer.scene.pick(movement.endPosition);
      viewer.entities.values.forEach(e => { if (e.label) e.label.show = false; });
      if (Cesium.defined(picked) && picked.id && picked.id.label) {
        picked.id.label.show = true;
      }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    // Click pin -> open panel
    handler.setInputAction((click) => {
      const picked = viewer.scene.pick(click.position);
      if (Cesium.defined(picked) && picked.id && picked.id.properties) {
        const s = picked.id.properties.scene.getValue(Cesium.JulianDate.now());
        openPanel(s);
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // ---------- Panel ----------
    function openPanel(scene) {
      panelTitle.textContent = scene.title;

      badgeRow.innerHTML = "";
      const eraBadge = document.createElement("div");
      eraBadge.className = "badge";
      eraBadge.textContent = `Era: ${scene.era}`;

      const timeBadge = document.createElement("div");
      timeBadge.className = "badge";
      timeBadge.textContent = `Time: ${formatYear(scene.start)} → ${formatYear(scene.end)}`;

      const confBadge = document.createElement("div");
      confBadge.className = "badge";
      confBadge.textContent = `Confidence: ${scene.confidence}`;

      badgeRow.appendChild(eraBadge);
      badgeRow.appendChild(timeBadge);
      badgeRow.appendChild(confBadge);

      meta.textContent = scene.description;
      sources.innerHTML = "";
      if (scene.source_notes) {
        const sn = document.createElement("div");
        sn.style.marginBottom = "8px";
        sn.innerHTML = `<b>Historical notes:</b> ${scene.source_notes}`;
        sources.appendChild(sn);
      }
      if (scene.production_brief) {
        const vp = document.createElement("div");
        vp.style.marginTop = "8px";
        vp.style.padding = "8px";
        vp.style.borderRadius = "8px";
        vp.style.background = "rgba(255,255,255,0.06)";
        vp.style.borderLeft = "3px solid rgba(255,200,80,0.5)";
        vp.innerHTML = `<b style="color:rgba(255,200,80,0.9);font-size:11px;letter-spacing:.05em">AI PRODUCTION PROCESS</b><br/><span style="font-size:12px;color:rgba(255,255,255,0.7);line-height:1.5;white-space:pre-line">${scene.production_brief}</span>`;
        sources.appendChild(vp);
      }

      // Load video
      player.pause();
      player.removeAttribute("src");
      player.load();
      player.src = scene.video_url;
      player.play().catch(() => { /* autoplay might be blocked */ });

      panel.style.display = "block";
    }

    function closePanel() {
      panel.style.display = "none";
      player.pause();
      player.removeAttribute("src");
      player.load();
    }

    closeBtn.addEventListener("click", closePanel);

    function updateSliderState() {
      const isAll = selectedEra === "ALL";
      yearSlider.disabled = isAll;
      yearSlider.style.opacity = isAll ? "0.3" : "1";
      yearSlider.style.cursor = isAll ? "not-allowed" : "pointer";
      document.getElementById("yearLabel").style.opacity = isAll ? "0.3" : "1";
    }

    const eraYearMap = {
      ALL: -2560,
      ANCIENT: -2000,
      CLASSICAL: 200,
      MEDIEVAL: 800,
      EARLYMODERN: 1600,
      MODERN: 1930,
    };

    const eraButtons = Array.from(document.querySelectorAll(".eraBtn"));
    function setEra(era) {
      selectedEra = era;
      eraButtons.forEach(b => b.classList.toggle("active", b.dataset.era === era));
      if (era !== "ALL" && eraYearMap[era] !== undefined) {
        selectedYear = eraYearMap[era];
        yearSlider.value = selectedYear;
        updateYearLabel();
      }
      updateSliderState();
      rebuildEntities();
    }
    eraButtons.forEach(btn => btn.addEventListener("click", () => setEra(btn.dataset.era)));
    setEra("ALL");
  </script>
</body>

</html>
